<!-- @dsCard group="Type" viewport="700x250" name="Size scale" subtitle="7px micro-label → 15px wordmark, deliberately tiny" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:16px;background:var(--bg);color:var(--text);font-family:var(--font-mono);}
  .r{display:flex;align-items:baseline;gap:14px;padding:4px 0;border-bottom:1px solid var(--border);}
  .r:last-child{border-bottom:none;}
  .tok{font-size:9px;color:var(--dim);width:140px;flex-shrink:0;}
  .ex{color:var(--text);font-weight:700;}
</style></head>
<body>
  <div class="r"><span class="tok">--fs-logo · 15px</span><span class="ex" style="font-size:15px;color:var(--green)">Stock<span style="color:var(--text)">AI</span></span></div>
  <div class="r"><span class="tok">--fs-lg · 14px</span><span class="ex" style="font-size:14px">NVDA</span></div>
  <div class="r"><span class="tok">--fs-value · 12px</span><span class="ex" style="font-size:12px">$104,238</span></div>
  <div class="r"><span class="tok">--fs-base · 11px</span><span class="ex" style="font-size:11px">Run AI Analysis</span></div>
  <div class="r"><span class="tok">--fs-small · 10px</span><span class="ex" style="font-size:10px">table cell value</span></div>
  <div class="r"><span class="tok">--fs-tiny · 9px</span><span class="ex" style="font-size:9px">meta · tab label</span></div>
  <div class="r"><span class="tok">--fs-label · 8px</span><span class="ex" style="font-size:8px;text-transform:uppercase;letter-spacing:1.2px;color:var(--dim)">CARD TITLE</span></div>
  <div class="r"><span class="tok">--fs-micro · 7px</span><span class="ex" style="font-size:7px;text-transform:uppercase;letter-spacing:0.5px;color:var(--dim)">TOTAL VALUE</span></div>
</body></html>
