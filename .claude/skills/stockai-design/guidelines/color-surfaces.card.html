<!-- @dsCard group="Colors" viewport="700x150" name="Surfaces" subtitle="Near-black background → raised card, darkest to lightest" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:14px;background:var(--bg);}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
  .sw{border-radius:8px;overflow:hidden;border:1px solid var(--border);}
  .chip{height:54px;}
  .meta{padding:6px 8px;background:var(--card);}
  .nm{font-size:10px;color:var(--text);font-weight:700;}
  .hx{font-size:9px;color:var(--dim);margin-top:1px;}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#060910"></div><div class="meta"><div class="nm">--bg</div><div class="hx">#060910</div></div></div>
    <div class="sw"><div class="chip" style="background:#070b12"></div><div class="meta"><div class="nm">--tape</div><div class="hx">#070b12</div></div></div>
    <div class="sw"><div class="chip" style="background:#0d1117"></div><div class="meta"><div class="nm">--surface</div><div class="hx">#0d1117</div></div></div>
    <div class="sw"><div class="chip" style="background:#111827"></div><div class="meta"><div class="nm">--card</div><div class="hx">#111827</div></div></div>
    <div class="sw"><div class="chip" style="background:#0d1420"></div><div class="meta"><div class="nm">--field</div><div class="hx">#0d1420</div></div></div>
  </div>
</body></html>
