<!-- @dsCard group="Colors" viewport="700x130" name="Tinted washes" subtitle="Translucent semantic fills for chips, pills & accents" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:16px;background:var(--bg);display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
  .pill{padding:4px 12px;border-radius:20px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.3px;}
  .chip{padding:3px 8px;border-radius:4px;font-size:10px;font-weight:600;}
</style></head>
<body>
  <span class="pill" style="background:var(--green-wash);color:var(--green);border:1px solid var(--green-line)">Bullish</span>
  <span class="pill" style="background:var(--red-wash);color:var(--red);border:1px solid var(--red-line)">Bearish</span>
  <span class="pill" style="background:rgba(139,152,174,0.12);color:var(--muted);border:1px solid rgba(139,152,174,0.2)">Neutral</span>
  <span class="chip" style="background:var(--blue-wash);color:var(--blue);border:1px solid var(--blue-line)">RSI 41</span>
  <span class="chip" style="background:var(--yellow-wash);color:var(--yellow)">Earnings 7d</span>
  <span class="chip" style="background:var(--purple-wash);color:var(--purple);border:1px solid var(--purple-line)">Opus 4.8</span>
  <span class="chip" style="background:var(--green-wash);color:var(--green);border:1px solid var(--green-line)">Paper</span>
</body></html>
