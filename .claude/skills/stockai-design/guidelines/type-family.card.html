<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:16px;background:var(--bg);color:var(--text);font-family:var(--font-mono);}
  .big{font-size:30px;font-weight:800;letter-spacing:-0.5px;}
  .specimen{font-size:13px;color:var(--muted);margin-top:8px;letter-spacing:0.5px;}
  .lbl{font-size:9px;color:var(--dim);margin-top:8px;}
</style></head>
<body>
  <div class="big">NVDA $118.40 <span style="color:var(--green)">+2.4%</span></div>
  <div class="specimen">ABCDEFGHIJKLM nopqrstuvwxyz 0123456789 $ % + − . , ▲ ▼ ●</div>
  <div class="lbl">--font-mono · 'JetBrains Mono', 'SF Mono', 'Cascadia Code', Menlo, monospace</div>
</body></html>
