<!-- @dsCard group="Spacing" viewport="700x150" name="Radii" subtitle="Gentle 4–8px corners, 20px pills" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:16px;background:var(--bg);color:var(--text);font-family:var(--font-mono);display:flex;gap:14px;align-items:flex-end;}
  .col{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .box{width:52px;height:52px;background:var(--card);border:1px solid var(--border2);}
  .lbl{font-size:8px;color:var(--dim);text-align:center;}
</style></head>
<body>
  <div class="col"><div class="box" style="border-radius:4px"></div><div class="lbl">--r-xs<br>4px</div></div>
  <div class="col"><div class="box" style="border-radius:5px"></div><div class="lbl">--r-sm<br>5px</div></div>
  <div class="col"><div class="box" style="border-radius:6px"></div><div class="lbl">--r-md<br>6px</div></div>
  <div class="col"><div class="box" style="border-radius:7px"></div><div class="lbl">--r-lg<br>7px</div></div>
  <div class="col"><div class="box" style="border-radius:8px"></div><div class="lbl">--r-xl<br>8px</div></div>
  <div class="col"><div class="box" style="border-radius:20px;width:84px"></div><div class="lbl">--r-pill<br>20px</div></div>
</body></html>
