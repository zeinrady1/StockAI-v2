<!-- @dsCard group="Type" viewport="700x150" name="Weights & uppercase labels" subtitle="Black-800 workhorse + tracked-out micro eyebrows" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:16px;background:var(--bg);color:var(--text);font-family:var(--font-mono);display:flex;gap:36px;align-items:flex-start;}
  .col{display:flex;flex-direction:column;gap:8px;}
  .w{font-size:16px;}
  .lbl{font-size:9px;color:var(--dim);}
</style></head>
<body>
  <div class="col">
    <div class="w" style="font-weight:400">Regular 400</div>
    <div class="w" style="font-weight:500">Medium 500</div>
    <div class="w" style="font-weight:700">Bold 700</div>
    <div class="w" style="font-weight:800">Black 800 — tickers</div>
  </div>
  <div class="col" style="padding-top:2px">
    <div style="font-size:8px;text-transform:uppercase;letter-spacing:0.5px;color:var(--dim)">--ls-label · micro-label</div>
    <div style="font-size:8px;text-transform:uppercase;letter-spacing:1px;color:var(--dim)">--ls-eyebrow · section</div>
    <div style="font-size:8px;text-transform:uppercase;letter-spacing:1.2px;color:var(--dim)">--ls-wide · card title</div>
  </div>
</body></html>
