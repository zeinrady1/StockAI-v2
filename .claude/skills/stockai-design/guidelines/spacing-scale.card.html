<!-- @dsCard group="Spacing" viewport="700x140" name="Spacing scale" subtitle="Compact 2–14px steps — power-user density" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:16px;background:var(--bg);color:var(--text);font-family:var(--font-mono);display:flex;gap:10px;align-items:flex-end;}
  .col{display:flex;flex-direction:column;align-items:center;gap:5px;}
  .bar{background:var(--green);border-radius:2px;width:18px;}
  .lbl{font-size:8px;color:var(--dim);}
</style></head>
<body>
  <div class="col"><div class="bar" style="height:2px"></div><div class="lbl">2</div></div>
  <div class="col"><div class="bar" style="height:3px"></div><div class="lbl">3</div></div>
  <div class="col"><div class="bar" style="height:4px"></div><div class="lbl">4</div></div>
  <div class="col"><div class="bar" style="height:5px"></div><div class="lbl">5</div></div>
  <div class="col"><div class="bar" style="height:6px"></div><div class="lbl">6</div></div>
  <div class="col"><div class="bar" style="height:8px"></div><div class="lbl">8</div></div>
  <div class="col"><div class="bar" style="height:10px"></div><div class="lbl">10</div></div>
  <div class="col"><div class="bar" style="height:12px"></div><div class="lbl">12</div></div>
  <div class="col"><div class="bar" style="height:14px"></div><div class="lbl">14</div></div>
</body></html>
