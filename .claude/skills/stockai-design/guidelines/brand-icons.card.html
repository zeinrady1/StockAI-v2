<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:16px;background:var(--bg);font-family:var(--font-mono);}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;}
  .cell{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 6px;text-align:center;}
  .g{font-size:18px;}
  .l{font-size:8px;color:var(--dim);margin-top:6px;line-height:1.3;}
</style></head>
<body>
  <div class="grid">
    <div class="cell"><div class="g">🔍</div><div class="l">search</div></div>
    <div class="cell"><div class="g" style="color:var(--green)">▶</div><div class="l">run / play</div></div>
    <div class="cell"><div class="g" style="color:var(--yellow)">⚡</div><div class="l">refresh / auto</div></div>
    <div class="cell"><div class="g">📊</div><div class="l">insider</div></div>
    <div class="cell"><div class="g">📰</div><div class="l">news</div></div>
    <div class="cell"><div class="g">🇺🇸</div><div class="l">congress</div></div>
    <div class="cell"><div class="g" style="color:var(--dim)">▼</div><div class="l">accordion</div></div>
    <div class="cell"><div class="g" style="color:var(--green)">●</div><div class="l">live dot</div></div>
    <div class="cell"><div class="g" style="color:var(--green)">▲</div><div class="l">up / gain</div></div>
    <div class="cell"><div class="g" style="color:var(--red)">▼</div><div class="l">down / loss</div></div>
    <div class="cell"><div class="g" style="color:var(--blue)">●</div><div class="l">signal</div></div>
    <div class="cell"><div class="g">⏱</div><div class="l">market clock</div></div>
  </div>
</body></html>
