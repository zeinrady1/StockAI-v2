<!-- @dsCard group="Components" viewport="700x200" name="Forms — Input, Toggle" subtitle="Dark search field & amber pill switch" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 16px; background: var(--bg); }
  .row { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; margin-bottom: 14px; }
  .lbl { font-size: var(--fs-label); text-transform: uppercase; letter-spacing: var(--ls-eyebrow);
         color: var(--dim); width: 100%; margin-bottom: 2px; }
  .field { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: var(--fs-tiny); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Input, Toggle } = window.StockAIDesignSystem_ed0dbf;
function Demo() {
  const [a, setA] = React.useState(true);
  const [b, setB] = React.useState(false);
  return (
    <div>
      <div className="lbl">Search field</div>
      <div className="row">
        <Input icon="🔍" placeholder="Search ticker, company, or sector — NVDA, Apple…" wrapStyle={{flex:'1',maxWidth:'420px'}} />
      </div>
      <div className="row">
        <Input placeholder="Ticker" defaultValue="NVDA" style={{width:'90px'}} />
      </div>
      <div className="lbl">Toggle</div>
      <div className="row">
        <div className="field"><Toggle checked={a} onChange={setA} /> Auto-execute this run</div>
        <div className="field"><Toggle checked={b} onChange={setB} /> Autonomous trading</div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
