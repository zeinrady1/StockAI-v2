<!-- @dsCard group="Components" viewport="700x300" name="Core — Button, Badge, Card" subtitle="Primary/ghost/buy-sell buttons, status chips & outlook pills, panel" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 16px; background: var(--bg); }
  .row { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; margin-bottom: 14px; }
  .lbl { font-size: var(--fs-label); text-transform: uppercase; letter-spacing: var(--ls-eyebrow);
         color: var(--dim); width: 100%; margin-bottom: 2px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Button, Badge, Card } = window.StockAIDesignSystem_ed0dbf;
function Demo() {
  return (
    <div>
      <div className="lbl">Buttons</div>
      <div className="row">
        <Button variant="primary">▶ Run AI Analysis</Button>
        <Button variant="secondary" size="sm">⚡ Refresh Intel</Button>
        <Button variant="primary" size="inline">Go</Button>
        <Button variant="buy" size="sm">Buy 12 sh</Button>
        <Button variant="sell" size="sm">Close</Button>
        <Button variant="primary" disabled>Submitting…</Button>
      </div>
      <div className="lbl">Badges & pills</div>
      <div className="row">
        <Badge tone="green">Paper</Badge>
        <Badge tone="purple">Opus 4.8</Badge>
        <Badge tone="blue">News</Badge>
        <Badge tone="green" shape="pill">Bullish</Badge>
        <Badge tone="red" shape="pill">Bearish</Badge>
        <Badge tone="muted" shape="pill">Neutral</Badge>
      </div>
      <div className="lbl">Card</div>
      <div className="row">
        <Card title="Portfolio" accessory={<Badge tone="green">Paper</Badge>} style={{width:'240px'}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'4px'}}>
            <div style={{background:'var(--well)',border:'1px solid var(--border)',borderRadius:'5px',padding:'6px 8px'}}>
              <div style={{fontSize:'7px',color:'var(--dim)',textTransform:'uppercase'}}>Total Value</div>
              <div style={{fontSize:'12px',fontWeight:800,color:'var(--green)'}}>$104,238</div>
            </div>
            <div style={{background:'var(--well)',border:'1px solid var(--border)',borderRadius:'5px',padding:'6px 8px'}}>
              <div style={{fontSize:'7px',color:'var(--dim)',textTransform:'uppercase'}}>Today P/L</div>
              <div style={{fontSize:'12px',fontWeight:800,color:'var(--green)'}}>+$1,204</div>
            </div>
          </div>
        </Card>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
